<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin prodotti | Ulakasha</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body class="admin-page admin-locked">
  <main class="admin-shell">
    <section class="admin-head">
      <a href="index.html" class="admin-logo" aria-label="Torna al sito Ulakasha">ūlakasha</a>
      <div>
        <span class="admin-kicker">Supabase Admin</span>
        <h1>Prodotti</h1>
        <p>Crea e modifica prodotti, immagini, descrizioni e categorie del sito.</p>
      </div>
    </section>

    <section class="admin-card" id="admin-login-panel">
      <h2>Accesso</h2>
      <form id="admin-login-form" class="admin-form">
        <label>Email
          <input id="admin-email" type="email" autocomplete="email" required>
        </label>
        <label>Password
          <input id="admin-password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Entra</button>
        <p class="admin-status" id="admin-login-status"></p>
      </form>
    </section>

    <section class="admin-grid" id="admin-panel" hidden style="display:none">
      <aside class="admin-card">
        <div class="admin-card-top">
          <h2>Lista prodotti</h2>
          <button type="button" id="admin-new-product">Nuovo</button>
        </div>
        <div class="admin-product-list" id="admin-product-list"></div>
        <button type="button" class="admin-ghost" id="admin-logout">Esci</button>
      </aside>

      <section class="admin-card">
        <h2 id="admin-form-title">Nuovo prodotto</h2>
        <form id="admin-product-form" class="admin-form admin-product-form">
          <input type="hidden" id="product-id">
          <div class="admin-two">
            <label>Slug
              <input id="product-slug" type="text" required placeholder="abito-seta-volto">
            </label>
            <label>Ordine
              <input id="product-sort" type="number" value="100">
            </label>
          </div>
          <div class="admin-two">
            <label>Categoria
              <select id="product-category">
                <option value="body">Abitare il corpo</option>
                <option value="home">Abitare la casa</option>
                <option value="art">Abitare l'arte</option>
                <option value="silk">Shop · Seta</option>
                <option value="knit">Shop · Maglieria</option>
                <option value="scarf">Shop · Foulard</option>
                <option value="accessory">Shop · Casa & Lifestyle</option>
              </select>
            </label>
            <label class="admin-check"><input id="product-active" type="checkbox" checked> Visibile sul sito</label>
          </div>
          <div class="admin-two">
            <label>Nome IT
              <input id="product-name-it" type="text" required>
            </label>
            <label>Nome EN
              <input id="product-name-en" type="text">
            </label>
          </div>
          <div class="admin-two">
            <label>Sottotitolo IT
              <input id="product-sub-it" type="text">
            </label>
            <label>Sottotitolo EN
              <input id="product-sub-en" type="text">
            </label>
          </div>
          <div class="admin-two">
            <label>Materiale IT
              <textarea id="product-material-it" rows="3"></textarea>
            </label>
            <label>Materiale EN
              <textarea id="product-material-en" rows="3"></textarea>
            </label>
          </div>
          <div class="admin-two">
            <label>Descrizione IT
              <textarea id="product-story-it" rows="5"></textarea>
            </label>
            <label>Descrizione EN
              <textarea id="product-story-en" rows="5"></textarea>
            </label>
          </div>
          <div class="admin-three">
            <label>Prezzo
              <input id="product-price" type="number" step="0.01" value="0">
            </label>
            <label>Taglie
              <input id="product-sizes" type="text" placeholder="XS, S, M, L">
            </label>
            <label>Badge
              <input id="product-badge" type="text" placeholder="Limited">
            </label>
          </div>
          <label>Link checkout / Shopify / Stripe
            <input id="product-stripe" type="url">
          </label>
          <label>Carica immagine
            <input id="product-image-file" type="file" accept="image/*">
          </label>
          <label>URL immagini
            <textarea id="product-images" rows="3" placeholder="Un URL per riga"></textarea>
          </label>
          <div class="admin-actions">
            <button type="submit">Salva prodotto</button>
            <button type="button" class="admin-danger" id="admin-delete-product">Elimina</button>
          </div>
          <p class="admin-status" id="admin-product-status"></p>
        </form>
      </section>
    </section>
  </main>
  <script src="supabase-config.js?v=2"></script>
  <script src="admin.js?v=3"></script>
</body>
</html>
